site_name: "Sejin Hwang, RPh's wiki"
site_url: https://sejinhwang.github.io/sejin-pharmacy-wiki/
site_description: Clinical pharmacy knowledge base, Epic templates, POMR workflows, and medicines optimisation notes
site_author: Sejin Hwang, RPh, BCGP, APA

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Meta-Database: meta-database.md
  - Pharmacy Practice:
      - Overview: pharmacy-practice/index.md
      - Alberta Pharmacy Care Plan: pharmacy-practice/alberta-pharmacy-care-plan.md
      - PIP | Pharmacist Independent Prescribing: pharmacy-practice/pip-minor-ailment.md
      - Symptom Sorter: pharmacy-practice/symptom-sorter.md
      - NHS | Do and Don't: pharmacy-practice/nhs-do-and-dont.md
      - Patient Care Process: pharmacy-practice/patient-care-process.md
      - Hospital Pharmacy 101: pharmacy-practice/hospital-pharmacy-101.md
  - BPS:
      - Overview: bps/index.md
      - Accident and Emergency Medicine | BCEMP: bps/bcemp.md
      - Infectious Diseases | BCIDP: bps/bcidp.md
      - Critical Care | BCCCP: bps/bcccp.md
      - Pharmacotherapy | BCPS: bps/bcps.md
      - Pharmacy Informatics: bps/pharmacy-informatics.md
      - Ambulatory Care | BCACP/BCMTMS: bps/bcacp-bcmtms.md
      - Oncology/Haematology | BCOP: bps/bcop.md
      - Nutrition Support | CNSC/BCNSP: bps/cnsc-bcnsp.md
      - Psychiatry | BCPP: bps/bcpp.md
      - Cardiology | BCCP: bps/bccp.md
      - Paediatric Pharmacotherapy | BCPPS: bps/bcpps.md
      - Geriatrics | BCGP: bps/bcgp.md
  - Other Certifications:
      - Overview: other-certifications/index.md
      - Diabetes | CDECB/CDCES/BC-ADM: other-certifications/diabetes.md
      - Travel and Tropical Medicine | CTH: other-certifications/travel-tropical-medicine.md
      - Anticoagulation | CACP: other-certifications/anticoagulation.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

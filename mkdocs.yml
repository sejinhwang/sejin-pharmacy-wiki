site_name: "Sejin Hwang, RPh's wiki"
site_url: https://sejinhwang.github.io/sejin-pharmacy-wiki/
site_description: Clinical pharmacy knowledge base, Epic templates, POMR workflows, and medicines optimisation notes
site_author: Sejin Hwang, RPh, BCGP, APA

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Index Page:
      - Overview: notion-index/index.md
      - Meta-Database: notion-index/meta-database.md
      - Pharmacy Practice:
          - Overview: notion-index/pharmacy-practice/index.md
          - Alberta Pharmacy Care Plan: notion-index/pharmacy-practice/alberta-pharmacy-care-plan.md
          - PIP | Pharmacist Independent Prescribing: notion-index/pharmacy-practice/pip-minor-ailment.md
          - Symptom Sorter: notion-index/pharmacy-practice/symptom-sorter.md
          - NHS | Do and Don't: notion-index/pharmacy-practice/nhs-do-and-dont.md
          - Patient Care Process: notion-index/pharmacy-practice/patient-care-process.md
          - Hospital Pharmacy 101: notion-index/pharmacy-practice/hospital-pharmacy-101.md
      - BPS:
          - Overview: notion-index/bps/index.md
          - Accident and Emergency Medicine | BCEMP: notion-index/bps/bcemp.md
          - Infectious Diseases | BCIDP: notion-index/bps/bcidp.md
          - Critical Care | BCCCP: notion-index/bps/bcccp.md
          - Pharmacotherapy | BCPS: notion-index/bps/bcps.md
          - Pharmacy Informatics: notion-index/bps/pharmacy-informatics.md
          - Ambulatory Care | BCACP/BCMTMS: notion-index/bps/bcacp-bcmtms.md
          - Oncology/Haematology | BCOP: notion-index/bps/bcop.md
          - Nutrition Support | CNSC/BCNSP: notion-index/bps/cnsc-bcnsp.md
          - Psychiatry | BCPP: notion-index/bps/bcpp.md
          - Cardiology | BCCP: notion-index/bps/bccp.md
          - Paediatric Pharmacotherapy | BCPPS: notion-index/bps/bcpps.md
          - Geriatrics | BCGP: notion-index/bps/bcgp.md
      - Other Certifications:
          - Overview: notion-index/other-certifications/index.md
          - Diabetes | CDECB/CDCES/BC-ADM: notion-index/other-certifications/diabetes.md
          - Travel and Tropical Medicine | CTH: notion-index/other-certifications/travel-tropical-medicine.md
          - Anticoagulation | CACP: notion-index/other-certifications/anticoagulation.md
  - Medicines:
      - Anticoagulation: medicines/anticoagulation/index.md
      - Antimicrobials: medicines/antimicrobials/index.md
      - Diabetes: medicines/diabetes/index.md
      - Cardiovascular: medicines/cardiovascular/index.md
      - CNS: medicines/cns/index.md
      - Pain: medicines/pain/index.md
      - Renal: medicines/renal/index.md
      - Geriatrics: medicines/geriatrics/index.md
  - Workflows:
      - Admission MedRec: workflows/admission-medrec.md
      - Discharge MedRec: workflows/discharge-medrec.md
      - LTC Medicines Review: workflows/ltc-medicines-review.md
      - AKI/CKD Medicines Review: workflows/aki-ckd-medicines-review.md
      - Anticoagulation Review: workflows/anticoagulation-review.md
  - Epic Templates:
      - Admission Consult: epic-templates/admission-consult.md
      - Progress Note: epic-templates/progress-note.md
      - i-Vent: epic-templates/i-vent.md
      - SmartLists: epic-templates/smartlists.md
  - Clinical Guides:
      - Renal Dose Adjustment: clinical-guides/renal-dose-adjustment.md
      - High-Alert Medicines: clinical-guides/high-alert-medicines.md
      - Deprescribing: clinical-guides/deprescribing.md
      - Monitoring Parameters: clinical-guides/monitoring-parameters.md
  - References:
      - Bibliography: references/bibliography.md
      - Source Tracker: references/source-tracker.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
